name: 🏗️ Build GnuChan Engine

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  SCONS_CACHE: ${{ github.workspace }}/.scons_cache
  SCONS_CACHE_LIMIT: 4096
  SCONS_FLAGS: debug_symbols=no

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows Editor
            os: windows-latest
            platform: windows
            python_arch: x64
            target: release_debug
            tools: yes
            bin_glob: 'src/bin/gnuchan*.exe'
            artifact: gnuchan-windows-editor

          - name: Windows Export Template
            os: windows-latest
            platform: windows
            python_arch: x64
            target: release
            tools: no
            bin_glob: 'src/bin/gnuchan*.exe'
            artifact: gnuchan-windows-template

          - name: Linux Editor
            os: ubuntu-latest
            platform: x11
            target: release_debug
            tools: yes
            bin_glob: 'src/bin/gnuchan*'
            artifact: gnuchan-linux-editor

          - name: Linux Export Template
            os: ubuntu-latest
            platform: x11
            target: release
            tools: no
            bin_glob: 'src/bin/gnuchan*'
            artifact: gnuchan-linux-template

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.python_arch }}

      - name: Install SCons
        run: pip install scons

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxext-dev \
            libxrandr-dev \
            libxrender-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            libpulse-dev \
            libudev-dev \
            libfreetype6-dev \
            libpng-dev \
            libz-dev

      - name: Restore SCons Cache
        uses: actions/cache@v4
        id: scons-cache
        with:
          path: |
            ${{ env.SCONS_CACHE }}
            .sconsign*.dblite
          key: scons-cache-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('src/SConstruct', 'src/methods.py', 'src/version.py', 'src/platform_methods.py') }}
          restore-keys: |
            scons-cache-${{ runner.os }}-

      - name: Build
        id: build
        working-directory: src
        continue-on-error: true
        run: |
          scons platform=${{ matrix.platform }} tools=${{ matrix.tools }} target=${{ matrix.target }} ${{ env.SCONS_FLAGS }} > build_output.txt 2>&1

      - name: Upload Build Log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ runner.os }}-${{ matrix.name }}
          path: src/build_output.txt
          retention-days: 14

      - name: Fail if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Upload Artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bin_glob }}
          retention-days: 7
